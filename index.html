<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking OPE Rehabilitación</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f4f7f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #3498db; color: white; padding: 14px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #ebf5fb; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #d4e6f1; }
        .stat-val { display: block; font-size: 22px; font-weight: bold; color: #2980b9; }
        .stat-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .destacado { background-color: #fff9c4; font-weight: bold; }
        .info-header { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <h2>📊 Ranking OPE Rehabilitación</h2>
    <p class="info-header">Estimación basada en la probabilidad de las notas registradas.</p>

    <div class="card" id="paso1">
        <h3>1. Identifícate</h3>
        <input type="text" id="dni" placeholder="DNI con asteriscos (ej: ***2176**)">
        <button id="btnBusca" onclick="buscarDNI()">Verificar mi Nota</button>
    </div>

    <div class="card" id="paso2" style="display:none;">
        <div id="infoPersona" style="margin-bottom:15px; font-weight:bold;"></div>
        <h3>2. Tu Autobaremo</h3>
        <input type="number" step="0.001" id="baremo" placeholder="Puntos méritos (ej: 32.5)">
        <button id="btnEnviar" onclick="enviarTodo()">Calcular mi Puesto</button>
    </div>

    <div class="card" id="panelStats" style="display:none;">
        <h3>Tu Posición Estimada</h3>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Puesto en Web</span>
                <span class="stat-val" id="posWeb">-</span>
            </div>
            <div class="stat-box" style="background: #e8f8f5; border-color: #d1f2eb;">
                <span class="stat-label">Puesto Final Est.</span>
                <span class="stat-val" id="posEst" style="color: #16a085;">-</span>
            </div>
        </div>
        <p id="msgParticipacion" style="font-size: 12px; text-align: center; margin-top: 10px; color: #7f8c8d;"></p>
    </div>

    <div class="card">
        <h3>Ranking General</h3>
        <table id="tablaRanking">
            <thead><tr><th>#</th><th>DNI</th><th>Total</th></tr></thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyg3ZdvE_eFkx4TmDl7LO9lf47KZyK_op4ci144s9Hyq0FwbFER85kUtmAa-xM5JB_LYQ/exec";
        let notaExamenOficial = 0;

        async function buscarDNI() {
            const dni = document.getElementById('dni').value.toUpperCase().trim();
            const btn = document.getElementById('btnBusca');
            btn.disabled = true;
            try {
                const resp = await fetch(`${WEB_APP_URL}?dni_buscar=${dni}`);
                const data = await resp.json();
                if(data.success) {
                    notaExamenOficial = data.notaExamen;
                    document.getElementById('infoPersona').innerText = `Hola, ${data.nombre}. Nota examen: ${notaExamenOficial}`;
                    document.getElementById('paso1').style.display = 'none';
                    document.getElementById('paso2').style.display = 'block';
                } else { alert("DNI no encontrado."); btn.disabled = false; }
            } catch (e) { alert("Error."); btn.disabled = false; }
        }

        async function enviarTodo() {
            const baremo = document.getElementById('baremo').value;
            const dni = document.getElementById('dni').value.toUpperCase().trim();
            if(!baremo) return;
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ dni, autobaremo: baremo, examen: notaExamenOficial })});
                localStorage.setItem('ope_dni', dni);
                location.reload();
            } catch (e) { alert("Error al guardar."); }
        }

        async function cargarRanking() {
            try {
                const resp = await fetch(WEB_APP_URL);
                const obj = await resp.json();
                const data = obj.ranking;
                const N_total = obj.totalN;
                const miDni = localStorage.getItem('ope_dni');
                const cuerpo = document.getElementById('cuerpoTabla');

                data.sort((a, b) => b.total - a.total);

                data.forEach((user, index) => {
                    const fila = cuerpo.insertRow();
                    const puestoActual = index + 1;
                    if(user.dni === miDni) {
                        fila.className = 'destacado';
                        // CÁLCULO MATEMÁTICO DE POSICIÓN ESTIMADA
                        const n_participantes = data.length;
                        let puestoEstimado = 1;
                        if (n_participantes > 1) {
                            puestoEstimado = 1 + (N_total - 1) * (puestoActual - 1) / (n_participantes - 1);
                        }
                        
                        document.getElementById('panelStats').style.display = 'block';
                        document.getElementById('posWeb').innerText = `${puestoActual}º / ${n_participantes}`;
                        document.getElementById('posEst').innerText = `~${Math.round(puestoEstimado)}º`;
                        document.getElementById('msgParticipacion').innerText = `Participación actual: ${Math.round((n_participantes/N_total)*100)}% de ${N_total} aprobados.`;
                    }
                    fila.insertCell(0).innerText = puestoActual;
                    fila.insertCell(1).innerText = user.dni;
                    fila.insertCell(2).innerText = user.total.toFixed(3);
                });
            } catch (e) { console.log(e); }
        }
        cargarRanking();
    </script>
</body>
</html>
